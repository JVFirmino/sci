<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>SCI - Dashboard de Testes</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link rel="stylesheet" href="dashboard.css">
    <link rel="icon" href="https://www.sci.com.br/favicon.ico" type="image/png">
</head>
<body>

    <h1><img src="https://www.sci.com.br/arquivo/banner/114/14845082.png" alt="Logo SCI">Dashboards de Testes - RH NET Social</h1>

    <div class="dashboard">

        <div class="card">
            <h2>👁️ Visão Geral da Qualidade</h2>
            <canvas id="overviewChart"></canvas>
            <p id="qualityScore"></p>
        </div>

        <div class="card">
            <h2>📈 Evolução da Estabilidade</h2>
            <canvas id="trendChart"></canvas>
        </div>

        <div class="card">
            <h2>🧩 Qualidade por Módulo</h2>
            <canvas id="moduleChart"></canvas>
        </div>

        <div class="card">
            <h2>🚨 Falhas Recentes</h2>
            <canvas id="recentFailuresChart"></canvas>
        </div>

        <div class="card">
            <h2>⏱ Performance da Automação</h2>
            <canvas id="durationChart"></canvas>
        </div>

    </div>

<script type="module" src="./dashboard.js"></script>
</body>
</html>
